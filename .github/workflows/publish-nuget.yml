name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (for example 1.0.1)
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Package version could not be resolved.'
          }

          "package_version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Editor.sln

      - name: Build
        run: dotnet build Editor.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Editor.Core.Tests/Editor.Core.Tests.csproj -c Release --no-build

      - name: Pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\packages | Out-Null
          dotnet pack src\Editor.Core\Editor.Core.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.package_version }} -o artifacts\packages
          dotnet pack src\Editor.Controls\Editor.Controls.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.package_version }} -o artifacts\packages
          dotnet pack src\Editor.Controls.Defaults\Editor.Controls.Defaults.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.package_version }} -o artifacts\packages

      - name: Publish to nuget.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'NUGET_API_KEY secret is not set. Add it under repository Settings > Secrets and variables > Actions.'
          }

          Get-ChildItem artifacts\packages\*.nupkg |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            ForEach-Object {
              dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
            }
